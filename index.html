<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Family Heritage - High-fidelity interactive family tree visualization.">
<title>Family Heritage — The Living Chronicle</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a08;
    --surface: #141412;
    --surface-light: #1c1c1a;
    --accent: #d4af37;
    --accent-dim: #8a6d1a;
    --text-main: #e2e2d8;
    --text-muted: #8e8e82;
    --male: #3a5a8a;
    --female: #8a3a5a;
    --glass: rgba(20, 20, 18, 0.85);
    --border: rgba(212, 175, 55, 0.2);
    --shadow-xl: 0 20px 40px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* GRAIN TEXTURE OVERLAY */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 999;
  }

  /* NAVIGATION */
  header {
    height: 72px;
    background: var(--glass);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    position: relative;
    z-index: 100;
  }

  .logo-area { display: flex; align-items: center; gap: 15px; }
  .logo-icon { font-size: 2rem; filter: drop-shadow(0 0 8px var(--accent-dim)); }
  .logo-text h1 { 
    font-family: 'Playfair Display', serif; 
    font-size: 1.2rem; 
    letter-spacing: 1px;
    color: var(--accent);
  }
  .logo-text p { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }

  .nav-actions { display: flex; gap: 12px; }

  /* BUTTON STYLING */
  .btn {
    background: var(--surface-light);
    border: 1px solid var(--border);
    color: var(--text-main);
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }
  .btn:hover { background: var(--accent-dim); border-color: var(--accent); transform: translateY(-1px); }
  .btn.primary { background: var(--accent); color: var(--bg); font-weight: 600; }

  /* APP LAYOUT */
  .main-container { display: flex; height: calc(100vh - 72px); }

  /* SIDEBAR */
  .sidebar {
    width: 340px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 80;
  }
  .sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; }

  .sidebar-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .search-input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 8px;
    color: white;
    outline: none;
    font-family: 'Inter', sans-serif;
  }

  .member-list { flex: 1; overflow-y: auto; padding: 1rem; }
  .member-card {
    padding: 12px;
    margin-bottom: 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.02);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: 0.2s;
  }
  .member-card:hover { background: rgba(255,255,255,0.05); border-color: var(--accent-dim); }
  
  .avatar-sm {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 0.75rem; color: #fff;
  }

  /* CANVAS AREA */
  .canvas-wrapper {
    flex: 1;
    position: relative;
    background-image: radial-gradient(circle at center, #1a1a16 0%, #0a0a08 100%);
    overflow: hidden;
  }

  #familyTree { width: 100%; height: 100%; cursor: grab; }
  #familyTree:active { cursor: grabbing; }

  /* SVG ELEMENTS */
  .connector {
    fill: none;
    stroke: var(--accent-dim);
    stroke-width: 1.5;
    stroke-linecap: round;
    opacity: 0.4;
    transition: d 0.5s ease;
  }
  .node-rect {
    fill: var(--surface-light);
    stroke: var(--border);
    stroke-width: 1;
    rx: 12;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
    transition: 0.3s;
  }
  .node-group:hover .node-rect { stroke: var(--accent); stroke-width: 2; }
  .node-text-name { fill: var(--text-main); font-size: 13px; font-weight: 600; pointer-events: none; }
  .node-text-meta { fill: var(--text-muted); font-size: 10px; pointer-events: none; }

  /* MODALS */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: grid;
    place-items: center;
    z-index: 1000;
    opacity: 0; pointer-events: none; transition: 0.3s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal-content {
    background: var(--surface);
    width: 90%;
    max-width: 450px;
    padding: 2.5rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-xl);
    transform: scale(0.9); transition: 0.3s;
  }
  .modal-overlay.active .modal-content { transform: scale(1); }

  .form-group { margin-bottom: 1.2rem; }
  .form-group label { display: block; font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; }

  @media (max-width: 768px) {
    .sidebar { position: fixed; height: 100%; width: 280px; transform: translateX(-100%); }
    .sidebar.active { transform: translateX(0); }
    .nav-actions .btn span { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-icon">🌳</div>
    <div class="logo-text">
      <h1>FAMILY HERITAGE</h1>
      <p>The Living Chronicle</p>
    </div>
  </div>
  <div class="nav-actions">
    <button class="btn" onclick="toggleSidebar()"><span>Members</span></button>
    <button class="btn primary" onclick="openAddModal()"><span>+ New Member</span></button>
  </div>
</header>

<div class="main-container">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <input type="text" class="search-input" id="sidebarSearch" placeholder="Search lineage..." oninput="filterMembers()">
    </div>
    <div class="member-list" id="memberList">
      </div>
  </aside>

  <main class="canvas-wrapper">
    <svg id="familyTree">
        <g id="treeGroup"></g>
    </svg>
  </main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <h2 style="font-family:'Playfair Display'; margin-bottom: 1.5rem; color: var(--accent); font-weight: 400;">Add Ancestor</h2>
    <form id="memberForm" onsubmit="handleSave(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="mName" class="search-input" required placeholder="e.g. Samuel Mashozhera">
      </div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="form-group">
            <label>Gender</label>
            <select id="mGender" class="search-input">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
          </div>
          <div class="form-group">
            <label>Birth Year</label>
            <input type="number" id="mBirth" class="search-input" placeholder="1900">
          </div>
      </div>
      <div class="form-group">
        <label>Parent (Optional)</label>
        <select id="mParent" class="search-input">
            <option value="">None (Root)</option>
        </select>
      </div>
      <div style="display:flex; gap: 10px; margin-top: 1rem;">
          <button type="submit" class="btn primary" style="flex:1">Save Entry</button>
          <button type="button" class="btn" style="flex:1" onclick="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
  /**
   * STATE MANAGEMENT & PERSISTENCE
   */
  const defaultData = {
    members: [
        { id: "1", name: "Samuel Mashozhera", birth: 1945, gender: 'male', role: 'Patriarch' }
    ],
    links: []
  };

  let state = JSON.parse(localStorage.getItem('heritage_data')) || defaultData;

  const CONFIG = {
    NODE_WIDTH: 180,
    NODE_HEIGHT: 75,
    LEVEL_GAP: 130,
    SIBLING_GAP: 40
  };

  const svg = document.getElementById('familyTree');
  const treeGroup = document.getElementById('treeGroup');

  /**
   * LAYOUT ENGINE (RECURSIVE)
   */
  function calculateLayout(memberId, level = 0, offset = 0) {
    const member = state.members.find(m => m.id === memberId);
    if (!member) return offset;

    const children = state.links
        .filter(l => l.parent === memberId)
        .map(l => l.child);

    let currentOffset = offset;
    children.forEach(childId => {
        currentOffset = calculateLayout(childId, level + 1, currentOffset);
    });

    if (children.length === 0) {
        member.x = offset;
        currentOffset += CONFIG.NODE_WIDTH + CONFIG.SIBLING_GAP;
    } else {
        const first = state.members.find(m => m.id === children[0]);
        const last = state.members.find(m => m.id === children[children.length - 1]);
        member.x = (first.x + last.x) / 2;
    }

    member.y = level * CONFIG.LEVEL_GAP + 60;
    return currentOffset;
  }

  /**
   * RENDER LOGIC
   */
  function render() {
    treeGroup.innerHTML = '';
    
    // Find Roots (Members with no parents)
    const childIds = new Set(state.links.map(l => l.child));
    const roots = state.members.filter(m => !childIds.has(m.id));

    let globalOffset = 100;
    roots.forEach(root => {
        globalOffset = calculateLayout(root.id, 0, globalOffset) + CONFIG.SIBLING_GAP * 2;
    });

    // Draw Connectors
    state.links.forEach(link => {
        const p = state.members.find(m => m.id === link.parent);
        const c = state.members.find(m => m.id === link.child);
        if (!p || !c) return;

        const startX = p.x + (CONFIG.NODE_WIDTH / 2);
        const startY = p.y + CONFIG.NODE_HEIGHT;
        const endX = c.x + (CONFIG.NODE_WIDTH / 2);
        const endY = c.y;

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        const midY = (startY + endY) / 2;
        path.setAttribute("d", `M ${startX} ${startY} C ${startX} ${midY}, ${endX} ${midY}, ${endX} ${endY}`);
        path.setAttribute("class", "connector");
        treeGroup.appendChild(path);
    });

    // Draw Nodes
    state.members.forEach(m => {
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class", "node-group");
        g.style.transform = `translate(${m.x}px, ${m.y}px)`;

        const color = m.gender === 'male' ? 'var(--male)' : 'var(--female)';
        
        g.innerHTML = `
            <rect width="${CONFIG.NODE_WIDTH}" height="${CONFIG.NODE_HEIGHT}" class="node-rect" style="stroke: ${color}"></rect>
            <text x="15" y="30" class="node-text-name">${m.name}</text>
            <text x="15" y="52" class="node-text-meta">${m.gender.toUpperCase()} • BORN ${m.birth || 'N/A'}</text>
        `;
        treeGroup.appendChild(g);
    });

    updateSidebar();
    saveData();
  }

  function updateSidebar() {
    const list = document.getElementById('memberList');
    const parentSelect = document.getElementById('mParent');
    
    list.innerHTML = '';
    parentSelect.innerHTML = '<option value="">None (Root)</option>';

    state.members.sort((a,b) => a.name.localeCompare(b.name)).forEach(m => {
        // List
        const card = document.createElement('div');
        card.className = 'member-card';
        const color = m.gender === 'male' ? 'var(--male)' : 'var(--female)';
        card.innerHTML = `
            <div class="avatar-sm" style="background:${color}">${m.name[0]}</div>
            <div>
                <div style="font-size:0.85rem; font-weight:600">${m.name}</div>
                <div style="font-size:0.7rem; color:var(--text-muted)">${m.birth || 'Unknown'}</div>
            </div>
        `;
        list.appendChild(card);

        // Select Options
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name;
        parentSelect.appendChild(opt);
    });
  }

  /**
   * UI INTERACTIONS
   */
  function handleSave(e) {
    e.preventDefault();
    const id = Date.now().toString();
    const newMember = {
        id,
        name: document.getElementById('mName').value,
        gender: document.getElementById('mGender').value,
        birth: document.getElementById('mBirth').value,
        role: 'Descendant'
    };

    state.members.push(newMember);
    const parentId = document.getElementById('mParent').value;
    if (parentId) {
        state.links.push({ parent: parentId, child: id });
    }

    closeModal();
    render();
    e.target.reset();
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('sidebar').classList.toggle('collapsed');
  }

  function openAddModal() { document.getElementById('modal').classList.add('active'); }
  function closeModal() { document.getElementById('modal').classList.remove('active'); }
  function saveData() { localStorage.setItem('heritage_data', JSON.stringify(state)); }

  // PAN & ZOOM
  let isDragging = false;
  let startPos = { x: 0, y: 0 };
  let transform = { x: 0, y: 0, s: 1 };

  svg.addEventListener('mousedown', e => {
    if(e.target === svg) {
        isDragging = true;
        startPos = { x: e.clientX - transform.x, y: e.clientY - transform.y };
    }
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    transform.x = e.clientX - startPos.x;
    transform.y = e.clientY - startPos.y;
    treeGroup.setAttribute('transform', `translate(${transform.x}, ${transform.y}) scale(${transform.s})`);
  });

  window.addEventListener('mouseup', () => isDragging = false);

  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    transform.s *= delta;
    treeGroup.setAttribute('transform', `translate(${transform.x}, ${transform.y}) scale(${transform.s})`);
  });

  // Init
  render();
  console.log("System Initialized by K.Mash the HITMAKER");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhaka — The Living Chronicle</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--navy:#0d1b3e;
--gold:#c9a84c;
--white:#fff;
--card:#162040;
}

body{
margin:0;
font-family:'DM Sans',sans-serif;
background:var(--navy);
color:var(--white);
overflow:hidden;
}

header{
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.btn{
border:1px solid var(--gold);
padding:6px 12px;
cursor:pointer;
background:transparent;
color:#fff;
}

.btn.gold{
background:var(--gold);
color:#000;
}

.app{
display:flex;
height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
width:280px;
border-right:1px solid rgba(255,255,255,0.1);
overflow-y:auto;
padding:10px;
}

.member-card{
padding:8px;
margin-bottom:5px;
border:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

/* CANVAS */
.canvas{
flex:1;
overflow:auto;
position:relative;
}

.node{
position:absolute;
width:180px;
background:var(--card);
border:1px solid var(--gold);
padding:10px;
border-radius:10px;
text-align:center;
}

/* MODAL */
.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#162040;
padding:20px;
display:none;
z-index:10;
}

.modal input,.modal select,.modal textarea{
width:100%;
margin-bottom:8px;
padding:6px;
}

.signin{
position:fixed;
inset:0;
background:#0d1b3e;
display:flex;
align-items:center;
justify-content:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="signin" id="signin">
<button class="btn gold" onclick="createUser()">Create Private Profile</button>
</div>

<header>
<div>NHAKA</div>
<div>
<button class="btn" onclick="openModal()">Add Member</button>
</div>
</header>

<div class="app">

<div class="sidebar" id="sidebar"></div>

<div class="canvas" id="canvas"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

<input id="name" placeholder="Full Name">

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<input id="birth" placeholder="Birth Year">
<input id="death" placeholder="Death Year">

<input id="profession" placeholder="Profession">

<select id="province">
<option value="">Province</option>
<option>Harare</option>
<option>Bulawayo</option>
<option>Manicaland</option>
<option>Mashonaland Central</option>
<option>Mashonaland East</option>
<option>Mashonaland West</option>
<option>Masvingo</option>
<option>Matabeleland North</option>
<option>Matabeleland South</option>
<option>Midlands</option>
</select>

<input id="district" placeholder="District">
<input id="village" placeholder="Village">

<select id="totem">
<option value="">Totem</option>
<option>Moyo</option>
<option>Shumba</option>
<option>Nzou</option>
<option>Hungwe</option>
<option>Tsoko</option>
</select>

<input id="praise" placeholder="Clan Praise Name">
<input id="burial" placeholder="Burial Place">

<select id="parent">
<option value="">No Parent</option>
</select>

<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="save()">Save</button>
<button onclick="closeModal()">Close</button>

</div>

<script>
let user=null;
let state={members:[],links:[]};

function createUser(){
const name=prompt("Enter your name");
if(!name)return;

user=name;
localStorage.setItem("nhaka_user",name);

document.getElementById("signin").style.display="none";
load();
}

/* LOAD */
function load(){
const data=localStorage.getItem("nhaka_"+user);
if(data) state=JSON.parse(data);
render();
}

/* SAVE */
function persist(){
localStorage.setItem("nhaka_"+user,JSON.stringify(state));
}

/* MODAL */
function openModal(){
document.getElementById("modal").style.display="block";
populateParent();
}
function closeModal(){
document.getElementById("modal").style.display="none";
}

/* POPULATE PARENT */
function populateParent(){
const sel=document.getElementById("parent");
sel.innerHTML='<option value="">No Parent</option>';
state.members.forEach(m=>{
const o=document.createElement("option");
o.value=m.id;
o.textContent=m.name;
sel.appendChild(o);
});
}

/* SAVE MEMBER */
function save(){

const id="m_"+Date.now();

const m={
id,
name:name.value,
gender:gender.value,
birth:Number(birth.value),
death:Number(death.value),
profession:profession.value,
province:province.value,
district:district.value,
village:village.value,
totem:totem.value,
praise:praise.value,
burial:burial.value,
notes:notes.value
};

state.members.push(m);

if(parent.value){
state.links.push({parent:parent.value,child:id});
}

persist();
closeModal();
render();
}

/* SORT */
function sortMembers(){
return state.members.sort((a,b)=>{
return (a.birth||9999)-(b.birth||9999);
});
}

/* TREE BUILD */
function buildTree(){
const map={};
state.members.forEach(m=>map[m.id]={...m,children:[]});

state.links.forEach(l=>{
if(map[l.parent] && map[l.child]){
map[l.parent].children.push(map[l.child]);
}
});

return Object.values(map).filter(m=>{
return !state.links.find(l=>l.child===m.id);
});
}

/* RENDER */
function render(){

const canvas=document.getElementById("canvas");
const sidebar=document.getElementById("sidebar");

canvas.innerHTML="";
sidebar.innerHTML="";

const roots=buildTree();

let x=50;

function draw(node,depth){

const div=document.createElement("div");
div.className="node";

div.style.left=(x)+"px";
div.style.top=(depth*140+20)+"px";

div.innerHTML=`
<strong>${node.name}</strong><br>
${node.profession||''}<br>
${node.birth||''}<br>
${node.totem||''}
`;

canvas.appendChild(div);

sidebar.innerHTML+=`
<div class="member-card">${node.name}</div>
`;

let startX=x;

node.children.sort((a,b)=>(a.birth||9999)-(b.birth||9999));

node.children.forEach(child=>{
x+=220;
draw(child,depth+1);
});

if(node.children.length){
x=(startX+x)/2;
}

}

roots.sort((a,b)=>(a.birth||9999)-(b.birth||9999));

roots.forEach(r=>{
draw(r,0);
x+=260;
});

}

</script>

</body>
</html>
